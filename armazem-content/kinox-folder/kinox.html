<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="lero-program-icon.ico" type="image/x-icon">
    <title>Filmpalast.to - Das Original - Filme und Serien sofort & kostenlos anschauen und downloaden - Filmpalast.to</title>
    <style>

        *
        {
            margin: 0em;
            padding: 0em;
        }

        html, body
        {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        div#site-url
        {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 5em;
            background-color: #0b0b0b;
        }

        p
        {
            font-family: 'Courier New', Courier, monospace, Times, monospace;
            font-size: 1.5em;
            font-color: #f1f1f1;
        }

        iframe
        {
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>

    <div id="site-url"></div>
    
    <iframe id="id-do-seu-iframe" src="https://filmpalast.to" frameborder="0"></iframe>

    <script>

        const meuIframe = document.getElementById('id-do-seu-iframe');
        const displayUrl = document.getElementById('url-texto');
    
        // Executa toda vez que o iframe mudar de página
        iframe.onload = function() {
            try {
                // Captura a URL completa (href) ou apenas o caminho (pathname)
                const urlAtual = iframe.contentWindow.location.href;
                displayUrl.innerText = urlAtual;
            } catch (e) {
                // Caso o domínio seja diferente, cairá aqui
                displayUrl.innerText = "Acesso negado (Domínio diferente)";
                console.error("Erro: Não é possível ler a URL de domínios externos.");
            }
        };

    </script>

</body>
</html>
