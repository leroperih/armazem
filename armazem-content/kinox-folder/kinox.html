<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="lero-program-icon.ico" type="image/x-icon">
    <title>Filmpalast.to - Das Original - Filme und Serien sofort & kostenlos anschauen und downloaden - Filmpalast.to</title>
    <style>

        *
        {
            margin: 0em;
            padding: 0em;
        }

        html, body
        {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        iframe
        {
            width: 100%;
            height: 100%;
        }

    </style>
</head>
<body>

    <iframe id="id-do-seu-iframe" src="https://filmpalast.to" frameborder="0"></iframe>

    <script>

        const meuIframe = document.getElementById('id-do-seu-iframe');

        // Detecta quando o conteúdo do iframe muda
        meuIframe.onload = function () {
            try {
                // Pega a URL atual de dentro do iframe
                const urlInterna = meuIframe.contentWindow.location.pathname;

                // Atualiza a barra de endereços sem recarregar a página
                window.history.pushState({}, "", urlInterna);
            } catch (e) {
                console.error("Erro de segurança: domínios diferentes.");
            }
        };

    </script>

</body>
</html>
